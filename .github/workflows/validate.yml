name: Validate site

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: HTML and internal links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate HTML
        run: npx --yes html-validate@latest "public/**/*.html"

      - name: Check internal links and assets
        run: node scripts/check-internal-links.mjs

      - name: Check render visibility
        run: node scripts/check-render-visibility.mjs
