name: Daily site audit

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read
  checks: read
  statuses: read
  id-token: write

jobs:
  collect-audit-bundle:
    name: Collect audit bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: projects/220417285922/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-daily-site-audit@project-f1eb455e-61ca-400a-be3.iam.gserviceaccount.com

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install audit dependencies
        run: npm ci

      - name: Collect audit bundle
        env:
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
          GOOGLE_SEARCH_CONSOLE_URL_INSPECTION_MAX_TARGETS: ${{ vars.GOOGLE_SEARCH_CONSOLE_URL_INSPECTION_MAX_TARGETS }}
          GOOGLE_SEARCH_CONSOLE_URL_INSPECTION_LANGUAGE_CODE: ${{ vars.GOOGLE_SEARCH_CONSOLE_URL_INSPECTION_LANGUAGE_CODE }}
          GOOGLE_ANALYTICS_PROPERTY_ID: ${{ secrets.GOOGLE_ANALYTICS_PROPERTY_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_CI_METADATA_MAX_WORKFLOW_RUNS: ${{ vars.GITHUB_REPOSITORY_CI_METADATA_MAX_WORKFLOW_RUNS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: scripts/collect_audit_bundle.sh

      - name: Upload audit bundle
        uses: actions/upload-artifact@v4
        with:
          name: audit-bundle
          path: out/audit-bundle/
          if-no-files-found: error

  generate-ranked-proposals:
    name: Generate ranked proposals
    needs: collect-audit-bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download audit bundle
        uses: actions/download-artifact@v4
        with:
          name: audit-bundle
          path: out/audit-bundle

      - name: Generate ranked proposals
        env:
          OPENAI_ACCESS_TOKEN: ${{ secrets.OPENAI_ACCESS_TOKEN }}
          OPENAI_AUDIT_PROPOSAL_MODEL: ${{ vars.OPENAI_AUDIT_PROPOSAL_MODEL }}
          OPENAI_AUDIT_PROPOSAL_POLL_INTERVAL_MS: ${{ vars.OPENAI_AUDIT_PROPOSAL_POLL_INTERVAL_MS }}
          OPENAI_AUDIT_PROPOSAL_TIMEOUT_MS: ${{ vars.OPENAI_AUDIT_PROPOSAL_TIMEOUT_MS }}
        run: node scripts/generate-ranked-proposals.mjs

      - name: Upload ranked proposals
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranked-proposals
          path: |
            out/audit-bundle/audit-bundle.json
            out/audit-bundle/ranked-proposals.json
            out/audit-bundle/openai-proposal-response-metadata.json
          if-no-files-found: error
