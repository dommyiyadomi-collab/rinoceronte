name: Daily site audit

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  collect-audit-bundle:
    name: Collect audit bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install audit dependencies
        run: npm ci

      - name: Collect audit bundle
        env:
          GOOGLE_SEARCH_CONSOLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_CREDENTIALS_JSON }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
          GOOGLE_ANALYTICS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_ANALYTICS_CREDENTIALS_JSON }}
          GOOGLE_ANALYTICS_PROPERTY_ID: ${{ secrets.GOOGLE_ANALYTICS_PROPERTY_ID }}
        run: scripts/collect_audit_bundle.sh

      - name: Upload audit bundle
        uses: actions/upload-artifact@v4
        with:
          name: audit-bundle
          path: out/audit-bundle/
          if-no-files-found: error
