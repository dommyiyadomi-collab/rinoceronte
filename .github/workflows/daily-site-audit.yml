name: Daily site audit

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  collect-audit-bundle:
    name: Collect audit bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Collect audit bundle
        run: scripts/collect_audit_bundle.sh

      - name: Upload audit bundle
        uses: actions/upload-artifact@v4
        with:
          name: audit-bundle
          path: audit-bundle/
